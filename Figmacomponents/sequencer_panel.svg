<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Sequencer Panel Mockup -->
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#0A0A12"/>
  
  <!-- Tab bar -->
  <rect width="1200" height="32" fill="#0D0D1A"/>
  <line x1="0" y1="32" x2="1200" y2="32" stroke="#25253D" stroke-width="1" opacity="0.4"/>
  <rect x="400" y="0" width="100" height="32" fill="#00F0FF" opacity="0.13"/>
  <line x1="400" y1="30" x2="500" y2="30" stroke="#00F0FF" stroke-width="2"/>
  <text x="450" y="20" font-family="Inter, sans-serif" font-size="11" fill="#00F0FF" text-anchor="middle">Sequencer</text>
  
  <!-- Card1: Transport -->
  <rect x="19" y="51" width="1162" height="80" rx="8" fill="#25253D" opacity="0.45"/>
  <rect x="16" y="48" width="1162" height="80" rx="8" fill="#050510" opacity="0.65"/>
  <rect x="16" y="48" width="1162" height="80" rx="8" fill="#1A1A2E"/>
  <text x="24" y="61" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">TRANSPORT</text>
  
  <!-- Card2: Pattern slots -->
  <rect x="19" y="143" width="400" height="100" rx="8" fill="#25253D" opacity="0.45"/>
  <rect x="16" y="140" width="400" height="100" rx="8" fill="#050510" opacity="0.65"/>
  <rect x="16" y="140" width="400" height="100" rx="8" fill="#1A1A2E"/>
  <text x="24" y="153" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">PATTERNS</text>
  
  <!-- Card3: Step grid -->
  <rect x="19" y="253" width="1162" height="400" rx="8" fill="#25253D" opacity="0.45"/>
  <rect x="16" y="250" width="1162" height="400" rx="8" fill="#050510" opacity="0.65"/>
  <rect x="16" y="250" width="1162" height="400" rx="8" fill="#1A1A2E"/>
  <text x="24" y="263" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">STEP GRID</text>
  
  <!-- Step grid visualization (16 steps) -->
  <rect x="20" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="95" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="170" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="245" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="320" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="395" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="470" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="545" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="620" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="695" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="770" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="845" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="920" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="995" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="1070" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  <rect x="1145" y="275" width="70" height="300" rx="4" fill="#12121F"/>
  
  <!-- Card4: Export -->
  <rect x="435" y="661" width="300" height="60" rx="8" fill="#25253D" opacity="0.45"/>
  <rect x="432" y="658" width="300" height="60" rx="8" fill="#050510" opacity="0.65"/>
  <rect x="432" y="658" width="300" height="60" rx="8" fill="#1A1A2E"/>
  <text x="440" y="671" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">EXPORT</text>
</svg>