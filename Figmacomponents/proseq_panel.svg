<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Pro Sequencer Panel Mockup -->
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#0A0A12"/>
  
  <!-- Tab bar -->
  <rect width="1200" height="32" fill="#0D0D1A"/>
  <line x1="0" y1="32" x2="1200" y2="32" stroke="#25253D" stroke-width="1" opacity="0.4"/>
  <rect x="500" y="0" width="100" height="32" fill="#00F0FF" opacity="0.13"/>
  <line x1="500" y1="30" x2="600" y2="30" stroke="#00F0FF" stroke-width="2"/>
  <text x="550" y="20" font-family="Inter, sans-serif" font-size="11" fill="#00F0FF" text-anchor="middle">Pro Seq</text>
  
  <!-- Card1: Transport -->
  <rect x="19" y="51" width="1162" height="80" rx="8" fill="#25253D" opacity="0.45"/>
  <rect x="16" y="48" width="1162" height="80" rx="8" fill="#050510" opacity="0.65"/>
  <rect x="16" y="48" width="1162" height="80" rx="8" fill="#1A1A2E"/>
  <text x="24" y="61" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">TRANSPORT</text>
  
  <!-- Card2: Lane/mode controls -->
  <rect x="19" y="143" width="1162" height="100" rx="8" fill="#25253D" opacity="0.45"/>
  <rect x="16" y="140" width="1162" height="100" rx="8" fill="#050510" opacity="0.65"/>
  <rect x="16" y="140" width="1162" height="100" rx="8" fill="#1A1A2E"/>
  <text x="24" y="153" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">LANE / MODE CONTROLS</text>
  
  <!-- Card3: Step grid (4 lanes) -->
  <rect x="19" y="253" width="1162" height="300" rx="8" fill="#25253D" opacity="0.45"/>
  <rect x="16" y="250" width="1162" height="300" rx="8" fill="#050510" opacity="0.65"/>
  <rect x="16" y="250" width="1162" height="300" rx="8" fill="#1A1A2E"/>
  <text x="24" y="263" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">STEP GRID - 4 LANES</text>
  
  <!-- 4 lane rows -->
  <rect x="20" y="275" width="1150" height="60" rx="4" fill="#12121F"/>
  <rect x="20" y="345" width="1150" height="60" rx="4" fill="#12121F"/>
  <rect x="20" y="415" width="1150" height="60" rx="4" fill="#12121F"/>
  <rect x="20" y="485" width="1150" height="60" rx="4" fill="#12121F"/>
  
  <!-- Card4: Step editor -->
  <rect x="19" y="561" width="1162" height="200" rx="8" fill="#25253D" opacity="0.45"/>
  <rect x="16" y="558" width="1162" height="200" rx="8" fill="#050510" opacity="0.65"/>
  <rect x="16" y="558" width="1162" height="200" rx="8" fill="#1A1A2E"/>
  <text x="24" y="571" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">STEP EDITOR</text>
</svg>