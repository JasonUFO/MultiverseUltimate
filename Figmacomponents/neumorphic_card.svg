<svg width="200" height="150" xmlns="http://www.w3.org/2000/svg">
  <!-- Neumorphic Card -->
  <!-- Light shadow (top-left) -->
  <rect x="5" y="5" width="190" height="140" rx="8" fill="#25253D" opacity="0.45"/>
  <!-- Dark shadow (bottom-right) -->
  <rect x="3" y="3" width="190" height="140" rx="8" fill="#050510" opacity="0.65"/>
  <!-- Card body -->
  <rect x="3" y="3" width="190" height="140" rx="8" fill="#1A1A2E"/>
  <!-- Optional neon border -->
  <rect x="3" y="3" width="190" height="140" rx="8" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.2"/>
  <!-- Section title -->
  <text x="11" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">SECTION</text>
</svg>