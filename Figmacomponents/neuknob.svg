<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <!-- NeuKnob - 80px disc -->
  
  <!-- Light shadow (top-left) -->
  <ellipse cx="42" cy="42" rx="38" ry="38" fill="#25253D" opacity="0.55"/>
  <!-- Dark shadow (bottom-right) -->
  <ellipse cx="38" cy="38" rx="38" ry="38" fill="#050510" opacity="0.70"/>
  
  <!-- Main disc with radial gradient -->
  <defs>
    <radialGradient id="discGrad" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#1C1C36"/>
      <stop offset="100%" stop-color="#16162A"/>
    </radialGradient>
  </defs>
  <circle cx="40" cy="40" r="38" fill="url(#discGrad)"/>
  
  <!-- Arc groove (270° sweep at 70% radius = 26.6px) -->
  <circle cx="40" cy="40" r="26.6" fill="none" stroke="#050510" stroke-width="5" opacity="0.8"
    stroke-dasharray="125.6 41.9" stroke-dashoffset="-20.95" transform="rotate(135, 40, 40)"/>
  <circle cx="40" cy="40" r="26.6" fill="none" stroke="#12121F" stroke-width="3"
    stroke-dasharray="125.6 41.9" stroke-dashoffset="-20.95" transform="rotate(135, 40, 40)"/>
  
  <!-- Fill arc (neon cyan, 45° = ~39% of sweep) -->
  <circle cx="40" cy="40" r="26.6" fill="none" stroke="#00F0FF" stroke-width="3" opacity="1"
    stroke-dasharray="56.5 110.5" stroke-dashoffset="-20.95" transform="rotate(135, 40, 40)"/>
  <!-- Glow effect for fill arc -->
  <circle cx="40" cy="40" r="26.6" fill="none" stroke="#00F0FF" stroke-width="3" opacity="0.25" filter="blur(5px)"
    stroke-dasharray="56.5 110.5" stroke-dashoffset="-20.95" transform="rotate(135, 40, 40)"/>
  
  <!-- Tip dot (end of fill arc at 135+45=180°) -->
  <circle cx="66.6" cy="40" r="3" fill="#00F0FF" opacity="0.7"/>
  <circle cx="66.6" cy="40" r="3" fill="#00F0FF" opacity="0.35" filter="blur(10px)"/>
  
  <!-- Center cap (40% of 38 = 15.2px radius) -->
  <defs>
    <radialGradient id="centerGrad" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#1E1E3A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </radialGradient>
  </defs>
  <circle cx="40" cy="40" r="15.2" fill="url(#centerGrad)"/>
  
  <!-- LED dot (5px, OFF state = bgDeep) -->
  <circle cx="40" cy="40" r="2.5" fill="#12121F"/>
  
  <!-- Value pill (hover state) -->
  <rect x="20" y="2" width="40" height="15" rx="4" fill="#12121F"/>
  <rect x="20" y="2" width="40" height="15" rx="4" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.5"/>
  <text x="40" y="13" font-family="Inter, sans-serif" font-size="9" fill="#E8E8FF" text-anchor="middle">0.50</text>
</svg>