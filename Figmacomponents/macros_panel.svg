<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="discGrad" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#1C1C36"/>
      <stop offset="100%" stop-color="#16162A"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#0A0A12"/>
  
  <!-- Tab bar -->
  <rect width="1200" height="32" fill="#0D0D1A"/>
  <line x1="0" y1="32" x2="1200" y2="32" stroke="#25253D" stroke-width="1" opacity="0.4"/>
  <rect x="900" y="0" width="100" height="32" fill="#00F0FF" opacity="0.13"/>
  <line x1="900" y1="30" x2="1000" y2="30" stroke="#00F0FF" stroke-width="2"/>
  <text x="950" y="20" font-family="Inter, sans-serif" font-size="11" fill="#00F0FF" text-anchor="middle">Macros</text>
  
  <!-- Card1: MACRO CONTROLS (all 8 macro knobs) -->
  <rect x="19" y="51" width="1162" height="700" rx="8" fill="#25253D" opacity="0.45"/>
  <rect x="16" y="48" width="1162" height="700" rx="8" fill="#050510" opacity="0.65"/>
  <rect x="16" y="48" width="1162" height="700" rx="8" fill="#1A1A2E"/>
  <text x="24" y="61" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">MACRO CONTROLS</text>
  
  <!-- 2×4 grid of macro knobs -->
  <!-- Row 1 -->
  <circle cx="180" cy="200" r="40" fill="url(#discGrad)"/>
  <circle cx="180" cy="200" r="40" fill="#25253D" opacity="0.55"/>
  <circle cx="180" cy="200" r="40" fill="#050510" opacity="0.70"/>
  <text x="180" y="280" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#E8E8FF" text-anchor="middle">Macro 1</text>
  
  <circle cx="420" cy="200" r="40" fill="url(#discGrad)"/>
  <circle cx="420" cy="200" r="40" fill="#25253D" opacity="0.55"/>
  <circle cx="420" cy="200" r="40" fill="#050510" opacity="0.70"/>
  <text x="420" y="280" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#E8E8FF" text-anchor="middle">Macro 2</text>
  
  <circle cx="660" cy="200" r="40" fill="url(#discGrad)"/>
  <circle cx="660" cy="200" r="40" fill="#25253D" opacity="0.55"/>
  <circle cx="660" cy="200" r="40" fill="#050510" opacity="0.70"/>
  <text x="660" y="280" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#E8E8FF" text-anchor="middle">Macro 3</text>
  
  <circle cx="900" cy="200" r="40" fill="url(#discGrad)"/>
  <circle cx="900" cy="200" r="40" fill="#25253D" opacity="0.55"/>
  <circle cx="900" cy="200" r="40" fill="#050510" opacity="0.70"/>
  <text x="900" y="280" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#E8E8FF" text-anchor="middle">Macro 4</text>
  
  <!-- Row 2 -->
  <circle cx="180" cy="430" r="40" fill="url(#discGrad)"/>
  <circle cx="180" cy="430" r="40" fill="#25253D" opacity="0.55"/>
  <circle cx="180" cy="430" r="40" fill="#050510" opacity="0.70"/>
  <text x="180" y="510" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#E8E8FF" text-anchor="middle">Macro 5</text>
  
  <circle cx="420" cy="430" r="40" fill="url(#discGrad)"/>
  <circle cx="420" cy="430" r="40" fill="#25253D" opacity="0.55"/>
  <circle cx="420" cy="430" r="40" fill="#050510" opacity="0.70"/>
  <text x="420" y="510" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#E8E8FF" text-anchor="middle">Macro 6</text>
  
  <circle cx="660" cy="430" r="40" fill="url(#discGrad)"/>
  <circle cx="660" cy="430" r="40" fill="#25253D" opacity="0.55"/>
  <circle cx="660" cy="430" r="40" fill="#050510" opacity="0.70"/>
  <text x="660" y="510" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#E8E8FF" text-anchor="middle">Macro 7</text>
  
  <circle cx="900" cy="430" r="40" fill="url(#discGrad)"/>
  <circle cx="900" cy="430" r="40" fill="#25253D" opacity="0.55"/>
  <circle cx="900" cy="430" r="40" fill="#050510" opacity="0.70"/>
  <text x="900" y="510" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#E8E8FF" text-anchor="middle">Macro 8</text>
</svg>