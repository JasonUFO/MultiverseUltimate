<svg width="120" height="30" xmlns="http://www.w3.org/2000/svg">
  <!-- Toggle Pill - ON state -->
  
  <!-- Light shadow -->
  <rect x="3" y="3" width="99" height="20" rx="10" fill="#25253D" opacity="0.45"/>
  <!-- Dark shadow -->
  <rect x="1" y="1" width="99" height="20" rx="10" fill="#050510" opacity="0.65"/>
  
  <!-- Body (ON = bgDeep + neon tint) -->
  <rect x="1" y="1" width="99" height="20" rx="10" fill="#12121F"/>
  <rect x="1" y="1" width="99" height="20" rx="10" fill="#00F0FF" opacity="0.18"/>
  
  <!-- LED dot (ON = neon cyan) -->
  <circle cx="11" cy="11" r="3.5" fill="#00F0FF"/>
  <circle cx="11" cy="11" r="3.5" fill="#00F0FF" opacity="0.35" filter="blur(10px)"/>
  
  <!-- Label -->
  <text x="20" y="16" font-family="Inter, sans-serif" font-size="11" fill="#E8E8FF">MPE</text>
</svg>