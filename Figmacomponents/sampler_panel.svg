<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="discGrad" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#1C1C36"/>
      <stop offset="100%" stop-color="#16162A"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#0A0A12"/>
  
  <!-- Tab bar -->
  <rect width="1200" height="32" fill="#0D0D1A"/>
  <line x1="0" y1="32" x2="1200" y2="32" stroke="#25253D" stroke-width="1" opacity="0.4"/>
  <rect x="300" y="0" width="100" height="32" fill="#00F0FF" opacity="0.13"/>
  <line x1="300" y1="30" x2="400" y2="30" stroke="#00F0FF" stroke-width="2"/>
  <text x="350" y="20" font-family="Inter, sans-serif" font-size="11" fill="#00F0FF" text-anchor="middle">Sampler</text>
  
  <!-- Card1: Drop zone -->
  <rect x="19" y="51" width="1162" height="150" rx="8" fill="#25253D" opacity="0.45"/>
  <rect x="16" y="48" width="1162" height="150" rx="8" fill="#050510" opacity="0.65"/>
  <rect x="16" y="48" width="1162" height="150" rx="8" fill="#1A1A2E"/>
  <text x="24" y="61" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">DROP ZONE</text>
  <rect x="500" y="85" width="200" height="80" rx="4" fill="none" stroke="#00F0FF" stroke-width="1" opacity="0.3"/>
  <text x="600" y="130" font-family="Inter, sans-serif" font-size="11" fill="#8888AA" text-anchor="middle">DROP SAMPLE HERE</text>
  
  <!-- Card2: Zone list -->
  <rect x="19" y="217" width="500" height="500" rx="8" fill="#25253D" opacity="0.45"/>
  <rect x="16" y="214" width="500" height="500" rx="8" fill="#050510" opacity="0.65"/>
  <rect x="16" y="214" width="500" height="500" rx="8" fill="#1A1A2E"/>
  <text x="24" y="227" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">ZONE LIST</text>
  
  <!-- Card3: Controls -->
  <rect x="535" y="217" width="646" height="500" rx="8" fill="#25253D" opacity="0.45"/>
  <rect x="532" y="214" width="646" height="500" rx="8" fill="#050510" opacity="0.65"/>
  <rect x="532" y="214" width="646" height="500" rx="8" fill="#1A1A2E"/>
  <text x="540" y="227" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#8888AA">CONTROLS</text>
  
  <!-- Control knobs -->
  <circle cx="600" cy="350" r="30" fill="url(#discGrad)"/>
  <circle cx="600" cy="350" r="30" fill="#25253D" opacity="0.55"/>
  <circle cx="600" cy="350" r="30" fill="#050510" opacity="0.70"/>
  <text x="600" y="375" font-family="Inter, sans-serif" font-size="9" fill="#8888AA" text-anchor="middle">Root</text>
  
  <circle cx="700" cy="350" r="30" fill="url(#discGrad)"/>
  <circle cx="700" cy="350" r="30" fill="#25253D" opacity="0.55"/>
  <circle cx="700" cy="350" r="30" fill="#050510" opacity="0.70"/>
  <text x="700" y="375" font-family="Inter, sans-serif" font-size="9" fill="#8888AA" text-anchor="middle">Key</text>
  
  <circle cx="800" cy="350" r="30" fill="url(#discGrad)"/>
  <circle cx="800" cy="350" r="30" fill="#25253D" opacity="0.55"/>
  <circle cx="800" cy="350" r="30" fill="#050510" opacity="0.70"/>
  <text x="800" y="375" font-family="Inter, sans-serif" font-size="9" fill="#8888AA" text-anchor="middle">Gain</text>
</svg>